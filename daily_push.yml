name: Daily Auto Push
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'        # UTC 3:00 = 北京时间 11:00
jobs:
  auto-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 生成每日内容
        run: |
          echo "# 每日更新 $(date '+%Y-%m-%d %H:%M:%S UTC+8')" >> README.md
          echo "" >> README.md
          echo "本文件由 GitHub Actions 自动更新" >> README.md
      - name: 推送回仓库
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "🔄 每日自动更新 $(date '+%Y-%m-%d') [skip ci]"
          git push
