name: Daily Auto Push

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  auto-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Generate daily content
        run: |
          echo "# Daily Update $(date '+%Y-%m-%d %H:%M:%S UTC+8')" >> README.md
          echo "" >> README.md
          echo "This file is automatically updated by GitHub Actions" >> README.md
      - name: Push to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "🔄 Daily auto update $(date '+%Y-%m-%d') [skip ci]"
          git push
